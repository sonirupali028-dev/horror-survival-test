<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spills the Question</title>
    <link rel="stylesheet" href="Spills.css">
</head>
<body>
  

    <div class="container">
        <h1>Spills the Question</h1>
          <input type="text"
         id="name" 
         name="name" 
         placeholder="Enter your name">
   
    <h1>🫡Would You Survive a Horror Movie?</h1>
    <p>Answer the questions below to find out!🥶</p>

    <select id ="noise">
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>
    <label>
        Do you split up from your group?
    </label>
    <select id="split">
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>
    <label>
        Do you trust strangers?
    </label>
    <select id="trust">
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>
    <label>
        Do you run Mumma's room or hide in a closet?
    </label>
    <select id="closet">
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>
    <button  id="checkbtn">Check Survival</button>
    <button id="resetbtn">Reset</button>
    <div id="result">
   <script src="spills.js"></script>  
    </div>   
    </div>

</body>
</html>
